name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-package:
    name: Windows package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: pwsh
        working-directory: client
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: client/go.mod
          cache-dependency-path: client/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/frontend/package-lock.json

      - name: Validate release version
        run: |
          $version = (Get-Content -Raw -LiteralPath .\frontend\package.json | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match client version v$version"
          }
          Write-Output "CLIENT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "PACKAGE_BASENAME=sogame-client-v$version-windows-amd64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Audit production dependencies
        run: npm --prefix frontend audit --omit=dev --audit-level=high

      - name: Download official NetBird prerequisite
        run: |
          $metadata = Get-Content -Raw -LiteralPath .\build\netbird-release.json | ConvertFrom-Json
          $artifact = Join-Path $env:RUNNER_TEMP $metadata.windowsX64.artifact
          Invoke-WebRequest -UseBasicParsing -Uri $metadata.windowsX64.url -OutFile $artifact
          Write-Output "NETBIRD_MSI=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and verify package
        run: |
          .\scripts\package-windows.ps1 -NetBirdMSI $env:NETBIRD_MSI
          .\scripts\verify-release-package.ps1 -PackageRoot ".\build\release\$env:PACKAGE_BASENAME"
          $archive = Get-Item -LiteralPath ".\build\release\$env:PACKAGE_BASENAME.zip"
          $hash = Get-FileHash -LiteralPath $archive.FullName -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  $($archive.Name)" |
            Set-Content -LiteralPath .\build\release\SHA256SUMS.txt -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sogame-client-${{ github.ref_name }}-windows-amd64
          path: |
            client/build/release/sogame-client-v${{ env.CLIENT_VERSION }}-windows-amd64.zip
            client/build/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag `
              ".\build\release\$env:PACKAGE_BASENAME.zip#Windows x64 unsigned demo" `
              '.\build\release\SHA256SUMS.txt#SHA-256 checksums' `
              --clobber
          } else {
            gh release create $tag `
              ".\build\release\$env:PACKAGE_BASENAME.zip#Windows x64 unsigned demo" `
              '.\build\release\SHA256SUMS.txt#SHA-256 checksums' `
              --verify-tag `
              --notes 'Unsigned Windows demo build. Windows may show a SmartScreen warning. The bundled NetBird v0.74.7 MSI retains its official NetBird GmbH signature.' `
              --title "Sogame $tag"
          }
