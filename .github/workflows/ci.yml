name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  room-api:
    name: Room API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: room-api
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: room-api/go.mod
          cache-dependency-path: room-api/go.sum

      - name: Test
        run: go test -mod=vendor ./...

      - name: Vet
        run: go vet -mod=vendor ./...

  windows-client:
    name: Windows client
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
        working-directory: client
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: client/go.mod
          cache-dependency-path: client/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/frontend/package-lock.json

      - name: Test Go packages
        run: go test ./...

      - name: Vet Go packages
        run: go vet ./...

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Audit production dependencies
        run: npm --prefix frontend audit --omit=dev --audit-level=high

      - name: Test frontend
        run: npm --prefix frontend test

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Windows application
        run: wails build -platform windows/amd64 -clean

      - name: Verify Windows executable
        run: |
          if (-not (Test-Path -LiteralPath .\build\bin\sogame.exe)) {
            throw 'Wails did not produce build/bin/sogame.exe'
          }
